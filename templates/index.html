<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Today</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{min-height:100%;background:#111111;color:#f0f0f0;font-family:'Inter',sans-serif}
  .wrap{max-width:540px;margin:0 auto;padding:48px 24px 80px}
  .top{margin-bottom:40px}
  .date{font-size:13px;color:#888;letter-spacing:.04em;margin-bottom:8px}
  .title{font-family:'Bebas Neue',sans-serif;font-size:64px;letter-spacing:.05em;line-height:1;color:#ffffff}
  .prog-wrap{margin-bottom:48px}
  .prog-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .prog-label{font-size:12px;color:#666;letter-spacing:.08em;font-weight:500}
  .prog-pct{font-family:'Bebas Neue',sans-serif;font-size:28px;color:#ffffff}
  .prog-track{height:3px;background:#2a2a2a;border-radius:3px}
  .prog-fill{height:100%;background:#ffffff;border-radius:3px;transition:width .4s}
  .section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
  .section-name{font-size:12px;letter-spacing:.12em;color:#ffffff;font-weight:600}
  .section-count{font-size:12px;color:#666;font-weight:400}
  .goal-row{display:flex;align-items:center;gap:16px;padding:16px 0;border-bottom:1px solid #1e1e1e;cursor:pointer;user-select:none;transition:opacity .15s}
  .goal-row:active{opacity:.5}
  .goal-row:last-child{border-bottom:none}
  .goal-row.done .goal-text{color:#444;text-decoration:line-through}
  .goal-row.done .check-box{background:#ffffff;border-color:#ffffff}
  .goal-row.done .check-box svg{opacity:1}
  .goal-row.removing{opacity:0;transition:opacity .4s,max-height .4s,padding .4s;max-height:80px;overflow:hidden}
  .goal-row.removing.gone{max-height:0;padding:0}
  .check-box{width:26px;height:26px;border:1.5px solid #444;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
  .check-box svg{width:14px;height:14px;opacity:0;transition:opacity .15s}
  .goal-text{font-size:16px;font-weight:400;flex:1;line-height:1.5;color:#e8e8e8;word-break:break-word}
  .goal-actions{display:flex;gap:4px;opacity:0;transition:opacity .15s}
  .goal-row:hover .goal-actions{opacity:1}
  .action-btn{background:none;border:none;color:#444;cursor:pointer;padding:6px;font-size:16px;line-height:1;flex-shrink:0;transition:color .15s;display:flex;align-items:center;justify-content:center}
  .action-btn:hover{color:#fff}
  .action-btn.delete:hover{color:#8b5a5a}
  .empty{font-size:13px;color:#444;padding:16px 0;font-style:italic}
  .all-done{font-size:13px;color:#666;padding:16px 0;text-align:center;letter-spacing:.05em}
  .add-row{display:flex;align-items:center;gap:12px;margin-top:12px;padding:14px 0;border-bottom:1px solid #1e1e1e}
  .add-input{background:none;border:none;padding:0;color:#f0f0f0;font-family:'Inter',sans-serif;font-size:16px;font-weight:300;flex:1;outline:none}
  .add-input::placeholder{color:#444}
  .add-btn{background:#ffffff;border:none;border-radius:8px;color:#111;cursor:pointer;width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;transition:all .15s}
  .add-btn:active{background:#ccc}
  .add-btn svg{width:18px;height:18px}
  .add-btn:disabled{background:#2a2a2a;cursor:default}
  .divider{height:1px;background:#1e1e1e;margin:40px 0}
  .skeleton{height:16px;border-radius:4px;background:#1e1e1e;margin:18px 0;animation:shimmer 1.2s infinite}
  .skeleton.short{width:55%}
  @keyframes shimmer{0%,100%{opacity:.4}50%{opacity:.9}}
  .toast{position:fixed;bottom:36px;left:50%;transform:translateX(-50%);background:#222;border:1px solid #333;border-radius:8px;padding:12px 20px;font-size:13px;color:#ccc;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;z-index:99;display:flex;align-items:center;gap:12px}
  .toast.show{opacity:1}
  .toast-undo{background:none;border:none;color:#888;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;letter-spacing:.08em;cursor:pointer;padding:0;pointer-events:auto;text-decoration:underline;text-underline-offset:2px}
  .toast-undo:hover{color:#fff}
  .edit-input{background:transparent;border:none;border-bottom:1px solid #555;color:#e8e8e8;font-family:'Inter',sans-serif;font-size:16px;flex:1;outline:none;padding:2px 0}
  .goal-row.editing .goal-actions{opacity:1}
  @media(max-width:480px){.goal-actions{opacity:1}}
  .drag-handle{width:20px;height:32px;display:flex;align-items:center;justify-content:center;cursor:grab;flex-shrink:0;opacity:0;transition:opacity .15s;touch-action:none}
  .drag-handle:active{cursor:grabbing}
  .drag-handle svg{width:14px;height:14px;color:#555}
  .goal-row:hover .drag-handle{opacity:1}
  .goal-row.dragging{opacity:.25}
  .goal-row.drag-over-top{border-top:2px solid #666 !important}
  .goal-row.drag-over-bot{border-bottom:2px solid #666 !important}
  @media(max-width:600px){.drag-handle{opacity:.35}}

  /* Shared journal styles */
  .journal-textarea{width:100%;background:none;border:none;border-bottom:1px solid #2a2a2a;padding:14px 0;color:#f0f0f0;font-family:'Inter',sans-serif;font-size:15px;font-weight:300;line-height:1.7;resize:none;outline:none;min-height:90px;overflow:hidden;transition:border-color .2s;display:block}
  .journal-textarea::placeholder{color:#444}
  .journal-textarea:focus{border-color:#555}
  .journal-save-row{display:flex;justify-content:flex-end;margin-top:12px;margin-bottom:8px}
  .journal-save-btn{background:none;border:1px solid #333;border-radius:6px;color:#888;font-family:'Inter',sans-serif;font-size:11px;font-weight:600;letter-spacing:.1em;cursor:pointer;padding:8px 16px;transition:all .15s}
  .journal-save-btn:hover{border-color:#888;color:#fff}
  .journal-save-btn:disabled{color:#333;border-color:#222;cursor:default}
  .journal-entry{padding:16px 0;border-bottom:1px solid #1a1a1a}
  .journal-entry:last-child{border-bottom:none}
  .journal-entry-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .journal-entry-date{font-size:11px;color:#555;letter-spacing:.05em}
  .journal-del{background:none;border:none;color:#333;cursor:pointer;padding:2px;transition:color .15s;display:flex}
  .journal-del:hover{color:#8b5a5a}
  .journal-entry-text{font-size:14px;font-weight:300;line-height:1.7;color:#999;white-space:pre-wrap;word-break:break-word}

  /* Accordion entries */
  .acc-entry{border-bottom:1px solid #1a1a1a}
  .acc-entry:last-child{border-bottom:none}
  .acc-header{display:flex;align-items:center;justify-content:space-between;padding:13px 0;cursor:pointer;user-select:none}
  .acc-header:active{opacity:.6}
  .acc-date{font-size:12px;color:#555;letter-spacing:.04em}
  .acc-right{display:flex;align-items:center;gap:10px}
  .acc-chevron{width:14px;height:14px;color:#444;transition:transform .2s;flex-shrink:0}
  .acc-entry.open .acc-chevron{transform:rotate(180deg)}
  .acc-body{overflow:hidden;max-height:0;transition:max-height .25s ease}
  .acc-entry.open .acc-body{max-height:600px}
  .acc-body-inner{padding:2px 0 14px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  .acc-text{font-size:14px;font-weight:300;line-height:1.7;color:#999;white-space:pre-wrap;word-break:break-word;flex:1}
  .acc-del{background:none;border:none;color:#2a2a2a;cursor:pointer;padding:2px;transition:color .15s;display:flex;flex-shrink:0;margin-top:2px}
  .acc-del:hover{color:#8b5a5a}

  /* Gratitude inputs */
  .gratitude-inputs{display:flex;flex-direction:column;gap:0}
  .gratitude-input-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #1e1e1e}
  .gratitude-num{font-size:11px;color:#444;width:16px;flex-shrink:0;text-align:right;letter-spacing:.05em}
  .gratitude-input{background:none;border:none;padding:0;color:#f0f0f0;font-family:'Inter',sans-serif;font-size:15px;font-weight:300;flex:1;outline:none}
  .gratitude-input::placeholder{color:#333}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="date" id="top-date"></div>
    <div class="title">Today</div>
  </div>
  <div class="prog-wrap">
    <div class="prog-meta">
      <span class="prog-label">PROGRESS</span>
      <span class="prog-pct" id="prog-pct">0%</span>
    </div>
    <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  </div>

  <div id="app-content">
    <!-- DAILY -->
    <div class="section-header"><span class="section-name">DAILY</span><span class="section-count" id="daily-count">–</span></div>
    <div id="daily-list"><div class="skeleton"></div><div class="skeleton short"></div><div class="skeleton"></div></div>
    <div class="add-row">
      <input class="add-input" id="daily-input" placeholder="add a daily goal..." autocomplete="off">
      <button class="add-btn" id="daily-add-btn" onclick="addGoal('daily')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>

    <div class="divider"></div>

    <!-- TO DO -->
    <div class="section-header"><span class="section-name">TO DO</span><span class="section-count" id="todo-count">–</span></div>
    <div id="todo-list"><div class="skeleton"></div><div class="skeleton short"></div></div>
    <div class="add-row">
      <input class="add-input" id="todo-input" placeholder="add a one-off task..." autocomplete="off">
      <button class="add-btn" id="todo-add-btn" onclick="addGoal('todo')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
  </div>

  <!-- GRATITUDE -->
  <div class="divider"></div>
  <div class="section-header">
    <span class="section-name">GRATITUDE</span>
    <span class="section-count" id="gratitude-count"></span>
  </div>
  <div class="gratitude-inputs">
    <div class="gratitude-input-row">
      <span class="gratitude-num">1</span>
      <input class="gratitude-input" id="grat-1" placeholder="i'm grateful for..." autocomplete="off">
    </div>
    <div class="gratitude-input-row">
      <span class="gratitude-num">2</span>
      <input class="gratitude-input" id="grat-2" placeholder="i'm grateful for..." autocomplete="off">
    </div>
    <div class="gratitude-input-row">
      <span class="gratitude-num">3</span>
      <input class="gratitude-input" id="grat-3" placeholder="i'm grateful for..." autocomplete="off">
    </div>
  </div>
  <div class="journal-save-row">
    <button class="journal-save-btn" id="grat-save-btn" onclick="saveGratitude()">SAVE</button>
  </div>
  <div id="gratitude-list"></div>

  <!-- DAILY NOTE -->
  <div class="divider"></div>
  <div class="section-header">
    <span class="section-name">DAILY NOTE</span>
    <span class="section-count" id="notes-count"></span>
  </div>
  <textarea class="journal-textarea" id="note-input" placeholder="what's on your mind today..." rows="3"></textarea>
  <div class="journal-save-row">
    <button class="journal-save-btn" id="note-save-btn" onclick="saveNote()">SAVE</button>
  </div>
  <div id="notes-list"></div>

  <!-- DREAM JOURNAL -->
  <div class="divider"></div>
  <div class="section-header">
    <span class="section-name">DREAM JOURNAL</span>
    <span class="section-count" id="dream-count"></span>
  </div>
  <textarea class="journal-textarea" id="dream-input" placeholder="what did you dream about..." rows="3"></textarea>
  <div class="journal-save-row">
    <button class="journal-save-btn" id="dream-save-btn" onclick="saveDream()">SAVE</button>
  </div>
  <div id="dreams-list"></div>
</div>
<div class="toast" id="toast"><span id="toast-msg"></span></div>

<script>
// ─── Utilities ───────────────────────────────────────────────────────────────

function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function formatDate(d) {
  return DAYS[d.getDay()] + ' · ' + MONTHS[d.getMonth()] + ' ' + d.getDate();
}

function entryDateLabel(ts) {
  const dt = new Date(ts);
  return dt.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })
       + ' · '
       + dt.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
}

function updateHeaderDate() {
  document.getElementById('top-date').textContent = formatDate(new Date());
}
updateHeaderDate();

// ─── Toast ───────────────────────────────────────────────────────────────────

let toastTimer = null;

function toast(msg, undoFn) {
  clearTimeout(toastTimer);
  const t     = document.getElementById('toast');
  const msgEl = document.getElementById('toast-msg');
  msgEl.textContent = msg;
  const old = t.querySelector('.toast-undo');
  if (old) old.remove();
  if (undoFn) {
    const btn = document.createElement('button');
    btn.className   = 'toast-undo';
    btn.textContent = 'UNDO';
    btn.onclick = () => { undoFn(); t.classList.remove('show'); };
    t.appendChild(btn);
  }
  t.classList.add('show');
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ─── State ───────────────────────────────────────────────────────────────────

let goals = [];
let goalsLoaded = false;

// ─── API helpers ─────────────────────────────────────────────────────────────

async function api(path, opts = {}) {
  const res = await fetch(path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
  });
  if (!res.ok) throw new Error(`API error ${res.status}`);
  return res.json();
}

// ─── Daily reset ─────────────────────────────────────────────────────────────

const LAST_RESET_KEY = 'today_last_reset';

async function maybeDailyReset() {
  const today     = new Date().toDateString();
  const lastReset = localStorage.getItem(LAST_RESET_KEY);
  if (lastReset === today) return;
  try {
    await api('/api/goals/reset-daily', { method: 'POST' });
    localStorage.setItem(LAST_RESET_KEY, today);
  } catch (e) {
    console.error('Reset-daily failed:', e);
  }
}

setInterval(async () => {
  const today     = new Date().toDateString();
  const lastReset = localStorage.getItem(LAST_RESET_KEY);
  if (lastReset !== today) {
    await maybeDailyReset();
    await loadGoals();
    updateHeaderDate();
  }
}, 60000);

// ─── Load goals ───────────────────────────────────────────────────────────────

async function loadGoals() {
  try {
    const raw = await api('/api/goals');
    goals = raw.map(g => ({
      id:    g.id,
      text:  g.text,
      type:  g.type,
      done:  !!g.done,
      order: g.order ?? g.id,
    }));
    goalsLoaded = true;
    render();
  } catch (e) {
    console.error('Failed to load goals:', e);
    document.getElementById('daily-list').innerHTML = '<div class="empty">couldn\'t load — check connection</div>';
    document.getElementById('todo-list').innerHTML  = '<div class="empty">couldn\'t load — check connection</div>';
  }
}

// ─── Render ───────────────────────────────────────────────────────────────────

function render() {
  if (!goalsLoaded) return;
  const daily = goals.filter(g => g.type === 'daily');
  const todos  = goals.filter(g => g.type === 'todo');
  const done   = goals.filter(g => g.done).length;
  const pct    = goals.length ? Math.round(done / goals.length * 100) : 0;

  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-pct').textContent  = pct + '%';

  document.getElementById('daily-count').textContent = daily.length ? `${daily.filter(g=>g.done).length}/${daily.length}` : '';
  document.getElementById('todo-count').textContent  = todos.length ? `${todos.filter(g=>g.done).length}/${todos.length}` : '';

  renderList(daily, 'daily-list');
  renderList(todos, 'todo-list');
}

function renderList(list, containerId) {
  const el = document.getElementById(containerId);
  if (!list.length) { el.innerHTML = '<div class="empty">nothing here yet</div>'; return; }
  if (list.every(g => g.done)) { el.innerHTML = '<div class="all-done">✓ all done</div>'; return; }

  el.innerHTML = list.map(g => `
    <div class="goal-row${g.done ? ' done' : ''}" id="goal-${g.id}" data-id="${g.id}">
      <div class="drag-handle" draggable="false" onmousedown="startDrag(event,${g.id})" ontouchstart="startDrag(event,${g.id})">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="5" r="1" fill="currentColor"/><circle cx="9" cy="12" r="1" fill="currentColor"/><circle cx="9" cy="19" r="1" fill="currentColor"/><circle cx="15" cy="5" r="1" fill="currentColor"/><circle cx="15" cy="12" r="1" fill="currentColor"/><circle cx="15" cy="19" r="1" fill="currentColor"/></svg>
      </div>
      <div class="check-box" onclick="toggleGoal(${g.id})">
        <svg viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <span class="goal-text" onclick="toggleGoal(${g.id})">${esc(g.text)}</span>
      <div class="goal-actions">
        <button class="action-btn" aria-label="Edit" onclick="event.stopPropagation();startEdit(${g.id})">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </button>
        <button class="action-btn delete" aria-label="Delete" onclick="event.stopPropagation();deleteGoal(${g.id})">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
          </svg>
        </button>
      </div>
    </div>`).join('');
}

// ─── Add goal ─────────────────────────────────────────────────────────────────

async function addGoal(type) {
  const inp = document.getElementById(type + '-input');
  const btn = document.getElementById(type + '-add-btn');
  const v   = inp.value.trim();
  if (!v) return;
  inp.value = ''; inp.disabled = true; btn.disabled = true;
  try {
    const g = await api('/api/goals', { method: 'POST', body: JSON.stringify({ text: v, type }) });
    goals.push({ id: g.id, text: g.text, type: g.type, done: !!g.done, order: g.id });
    render();
  } catch (e) {
    console.error('addGoal failed:', e);
    inp.value = v;
    toast('couldn\'t save — try again');
  } finally {
    inp.disabled = false; btn.disabled = false; inp.focus();
  }
}

// ─── Toggle ──────────────────────────────────────────────────────────────────

const pendingToggles = new Set();

async function toggleGoal(id) {
  if (pendingToggles.has(id)) return;
  pendingToggles.add(id);
  const g = goals.find(x => x.id === id);
  if (!g) { pendingToggles.delete(id); return; }
  const newDone = !g.done;
  g.done = newDone;
  render();
  try {
    await api(`/api/goals/${id}`, { method: 'PATCH', body: JSON.stringify({ done: newDone ? 1 : 0 }) });
    if (g.type === 'todo' && newDone) {
      setTimeout(() => { goals = goals.filter(x => x.id !== id); render(); }, 700);
    }
  } catch (e) {
    console.error('toggleGoal failed:', e);
    g.done = !newDone; render();
    toast('couldn\'t update — try again');
  } finally {
    pendingToggles.delete(id);
  }
}

// ─── Delete goal ─────────────────────────────────────────────────────────────

async function deleteGoal(id) {
  const g = goals.find(x => x.id === id);
  if (!g) return;
  goals = goals.filter(x => x.id !== id);
  render();
  toast(`deleted "${g.text.length > 24 ? g.text.slice(0, 24) + '…' : g.text}"`, async () => {
    try {
      const restored = await api('/api/goals', { method: 'POST', body: JSON.stringify({ text: g.text, type: g.type }) });
      goals.push({ id: restored.id, text: restored.text, type: restored.type, done: false, order: restored.id });
      render();
    } catch (e) { toast('undo failed'); }
  });
  try { await api(`/api/goals/${id}`, { method: 'DELETE' }); } catch (e) { console.error(e); }
}

// ─── Edit goal ───────────────────────────────────────────────────────────────

function startEdit(id) {
  const g = goals.find(x => x.id === id);
  if (!g) return;
  const row = document.getElementById('goal-' + id);
  if (!row || row.classList.contains('editing')) return;
  row.classList.add('editing');
  const textSpan = row.querySelector('.goal-text');
  const orig = g.text;
  const input = document.createElement('input');
  input.type = 'text'; input.className = 'edit-input'; input.value = orig;
  textSpan.replaceWith(input);
  input.focus(); input.select();

  async function finish(save) {
    const nv = input.value.trim();
    if (save && nv && nv !== orig) {
      g.text = nv; render();
      try {
        await api(`/api/goals/${id}`, { method: 'PATCH', body: JSON.stringify({ text: nv }) });
      } catch (e) { g.text = orig; render(); toast('couldn\'t save edit'); }
    } else { render(); }
  }

  let finished = false;
  function once(save) { if (finished) return; finished = true; finish(save); }
  input.addEventListener('blur', () => once(true));
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); once(true); }
    if (e.key === 'Escape') { input.value = orig; once(false); }
  });
}

// ─── Accordion helpers ───────────────────────────────────────────────────────

function accEntryHTML(prefix, id, ts, text, deleteFn) {
  return `<div class="acc-entry" id="${prefix}-${id}">
    <div class="acc-header">
      <span class="acc-date">${esc(entryDateLabel(ts))}</span>
      <div class="acc-right">
        <svg class="acc-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
    </div>
    <div class="acc-body">
      <div class="acc-body-inner">
        <div class="acc-text">${esc(text)}</div>
        <button class="acc-del" onclick="event.stopPropagation();${deleteFn}">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
          </svg>
        </button>
      </div>
    </div>
  </div>`;
}

function toggleAcc(el) {
  el.classList.toggle('open');
}

// ─── Gratitude ───────────────────────────────────────────────────────────────

async function loadGratitude() {
  try {
    const rows = await api('/api/gratitude');
    const countEl = document.getElementById('gratitude-count');
    const listEl  = document.getElementById('gratitude-list');
    countEl.textContent = rows.length || '';
    if (!rows.length) { listEl.innerHTML = '<div class="empty">no entries yet</div>'; return; }
    listEl.innerHTML = rows.map(r => accEntryHTML('grat-entry', r.id, r.created_at, r.entry, `deleteGratitude(${r.id})`)).join('');
    listEl.querySelectorAll('.acc-header').forEach(h => h.addEventListener('click', () => toggleAcc(h.parentElement)));
  } catch (e) {
    console.error('loadGratitude failed:', e);
    document.getElementById('gratitude-list').innerHTML = '<div class="empty">couldn\'t load</div>';
  }
}

async function saveGratitude() {
  const inputs = [
    document.getElementById('grat-1').value.trim(),
    document.getElementById('grat-2').value.trim(),
    document.getElementById('grat-3').value.trim(),
  ].filter(Boolean);

  if (!inputs.length) return;

  const btn = document.getElementById('grat-save-btn');
  btn.disabled = true;

  const entry = inputs.map((v, i) => `${i + 1}. ${v}`).join('\n');

  try {
    await api('/api/gratitude', { method: 'POST', body: JSON.stringify({ entry }) });
    document.getElementById('grat-1').value = '';
    document.getElementById('grat-2').value = '';
    document.getElementById('grat-3').value = '';
    toast('gratitude saved');
    loadGratitude();
  } catch (e) {
    console.error('saveGratitude failed:', e);
    toast('couldn\'t save — try again');
  } finally {
    btn.disabled = false;
  }
}

async function deleteGratitude(id) {
  const entry = document.getElementById('grat-entry-' + id);
  const text  = entry ? entry.querySelector('.acc-text').textContent : '';
  if (entry) entry.remove();
  const remaining = document.querySelectorAll('#gratitude-list .acc-entry').length;
  document.getElementById('gratitude-count').textContent = remaining || '';
  if (!remaining) document.getElementById('gratitude-list').innerHTML = '<div class="empty">no entries yet</div>';
  toast('deleted', async () => {
    try { await api('/api/gratitude', { method: 'POST', body: JSON.stringify({ entry: text }) }); loadGratitude(); }
    catch (e) { toast('undo failed'); }
  });
  try { await api('/api/gratitude/' + id, { method: 'DELETE' }); } catch (e) { console.error(e); }
}

// ─── Drag to reorder ─────────────────────────────────────────────────────────

let dragState = null;

function startDrag(e, id) {
  const g = goals.find(x => x.id === id);
  if (!g) return;
  e.preventDefault();

  const el = document.getElementById('goal-' + id);
  el.classList.add('dragging');

  dragState = { id, type: g.type, el };

  document.addEventListener('mousemove', onDragMove, { passive: false });
  document.addEventListener('mouseup',   onDragEnd);
  document.addEventListener('touchmove', onDragMove, { passive: false });
  document.addEventListener('touchend',  onDragEnd);
}

function clearDragOver() {
  document.querySelectorAll('.drag-over-top, .drag-over-bot').forEach(r => {
    r.classList.remove('drag-over-top', 'drag-over-bot');
  });
}

function getClientY(e) {
  return e.touches ? e.touches[0].clientY : e.clientY;
}

function onDragMove(e) {
  if (!dragState) return;
  e.preventDefault();
  clearDragOver();

  const clientY = getClientY(e);
  const rows = [...document.querySelectorAll(`#${dragState.type}-list .goal-row:not(.dragging)`)];

  for (const row of rows) {
    const rect = row.getBoundingClientRect();
    if (clientY < rect.top + rect.height / 2) {
      row.classList.add('drag-over-top');
      return;
    }
  }
  // Below all rows
  if (rows.length) rows[rows.length - 1].classList.add('drag-over-bot');
}

async function onDragEnd(e) {
  document.removeEventListener('mousemove', onDragMove);
  document.removeEventListener('mouseup',   onDragEnd);
  document.removeEventListener('touchmove', onDragMove);
  document.removeEventListener('touchend',  onDragEnd);

  if (!dragState) return;
  const { id, type, el } = dragState;
  dragState = null;
  el.classList.remove('dragging');

  const overTop = document.querySelector(`#${type}-list .drag-over-top`);
  const overBot = document.querySelector(`#${type}-list .drag-over-bot`);
  clearDragOver();

  const typeGoals = goals.filter(g => g.type === type);
  const fromIdx   = typeGoals.findIndex(g => g.id === id);
  let toIdx;

  if (overTop) {
    toIdx = typeGoals.findIndex(g => g.id === parseInt(overTop.dataset.id));
  } else if (overBot) {
    toIdx = typeGoals.findIndex(g => g.id === parseInt(overBot.dataset.id));
    if (toIdx !== -1) toIdx = toIdx + 1; // insert after
  }

  if (toIdx === undefined || toIdx === null || fromIdx === -1 || fromIdx === toIdx) return;

  const [moved] = typeGoals.splice(fromIdx, 1);
  // Adjust toIdx if we removed from before it
  const adjustedTo = fromIdx < toIdx ? toIdx - 1 : toIdx;
  typeGoals.splice(adjustedTo, 0, moved);
  typeGoals.forEach((g, i) => { g.order = i; });
  goals = goals.filter(g => g.type !== type).concat(typeGoals);
  render();

  try {
    await Promise.all(typeGoals.map((g, i) =>
      api(`/api/goals/${g.id}`, { method: 'PATCH', body: JSON.stringify({ order: i }) })
    ));
  } catch (err) {
    console.error('reorder failed:', err);
    toast('couldn\'t save order');
  }
}
